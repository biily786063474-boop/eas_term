name: Build Windows

# Windows 版在云端构建（node-pty 原生模块需在 Windows 上编译）。
# macOS 版在本地用 `npm run dist` 构建，不占用 GitHub 的 macOS runner 额度。
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # npm install 会触发 postinstall（electron-rebuild），在 Windows 上编译 node-pty
      - name: Install dependencies
        run: npm install

      - name: Build & package
        run: npm run dist:ci

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eas-term-win
          path: release/*.exe
          if-no-files-found: error

      # 打 tag 时把安装包发布到 GitHub Release，方便直接下载
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          fail_on_unmatched_files: false
