<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#12151f"/>
      <stop offset="1" stop-color="#0c0e15"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.0" r="0.9">
      <stop offset="0" stop-color="#3f63ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#3f63ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5f7bff"/>
      <stop offset="1" stop-color="#7aa2ff"/>
    </linearGradient>
  </defs>

  <rect width="540" height="380" fill="url(#bg)"/>
  <rect width="540" height="260" fill="url(#glow)"/>

  <!-- 标题 -->
  <text x="270" y="70" text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" font-weight="600" fill="#eaf0ff" letter-spacing="0.5">Eas-Term</text>
  <text x="270" y="100" text-anchor="middle"
        font-family="'PingFang SC', -apple-system, 'Helvetica Neue', sans-serif"
        font-size="14" fill="#8b94ab">将 Eas-Term 拖入 Applications 文件夹安装</text>

  <!-- 两个放置区背板 -->
  <g fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.09" stroke-width="1">
    <rect x="78"  y="150" width="144" height="144" rx="28"/>
    <rect x="318" y="150" width="144" height="144" rx="28"/>
  </g>

  <!-- 中间引导箭头 -->
  <g stroke="url(#arrow)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="246" y1="222" x2="292" y2="222"/>
    <path d="M280 210 L296 222 L280 234"/>
  </g>

  <!-- 底部提示 -->
  <text x="270" y="346" text-anchor="middle"
        font-family="'PingFang SC', -apple-system, 'Helvetica Neue', sans-serif"
        font-size="12.5" fill="#5d6478">未签名版本：首次打开请右键 App → 打开</text>
</svg>
